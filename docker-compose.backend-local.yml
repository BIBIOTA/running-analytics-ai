services:
  mongodb:
    image: mongo:7
    volumes:
      - mongodb_data:/data/db

  backend:
    image: python:3.12-slim
    working_dir: /app/apps/backend
    command: >
      sh -c "pip install -e . &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ${WORKTREE_PATH}/apps/backend:/app/apps/backend
      - ${WORKTREE_PATH}/api-contract:/app/api-contract
    env_file:
      - ${WORKTREE_PATH}/apps/backend/.env
    environment:
      MONGODB_URI: mongodb://mongodb:27017/running_analytics
      FRONTEND_URL: http://localhost:3000
      BACKEND_URL: http://localhost:8001
    ports:
      - "8001:8000"
    depends_on:
      - mongodb

volumes:
  mongodb_data:
