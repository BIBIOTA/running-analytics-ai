services:
  frontend:
    image: node:20-alpine
    working_dir: /app/apps/frontend
    command: >
      sh -c "npm install &&
      npm run dev -- --host 0.0.0.0 --port 3001"
    volumes:
      - ${WORKTREE_PATH}/apps/frontend:/app/apps/frontend
      - ${WORKTREE_PATH}/api-contract:/app/api-contract
    environment:
      VITE_API_BASE_URL: http://localhost:8001
      VITE_PROXY_TARGET: http://host.docker.internal:8001
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
